<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1 id="temp"></h1>
<script>
        let x=3;
        let y=2;
        setInterval(myfun,2000)
        function myfun(){
            document.getElementById("temp").innerHTML=x+y;
            x++;
            y++;
        }
    </script>
</body>
</html>
